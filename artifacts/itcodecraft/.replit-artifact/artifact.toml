kind = "web"
previewPath = "/"
title = "ITCodeCraft Roblox Edition"
version = "1.0.0"
id = "artifacts/itcodecraft"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/itcodecraft run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/itcodecraft", "run", "build" ]
publicDir = "artifacts/itcodecraft/dist"
serve = "static"

[services.env]
PORT = "5173"
